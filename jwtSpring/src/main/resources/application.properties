spring.application.name=jwtSpring

# Porta da aplicação (8080 é padrão, mude conforme necessário)
server.port=8080

# H2 em memória para desenvolvimento local
# Para usar arquivo local em vez de memória, descomente a linha abaixo:
# spring.datasource.url=jdbc:h2:./data/testdb
spring.datasource.url=jdbc:h2:mem:jwtSpring;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate para ciclo rápido de aprendizado
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Console web do H2 - Configuração para que o console fique acessível
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.trace=false
spring.h2.console.settings.web-allow-others=false

